<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173e35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="allbarun-recording-version" content="8.0.0-PRODUCTION-SAFE">
  <title>All바른 녹음체크</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="head">
    <div>
      <h1>&lt;경근T&gt; 녹음체크</h1>
      <small id="now-label">서버 확인 중</small>
    </div>
    <div class="head-actions">
      <span id="network-state" class="pill">온라인</span>
      <span id="sync-state" class="pill">준비</span>
      <button class="icon" type="button" onclick="openSettings()">설정</button>
    </div>
  </div>
</header>

<main>
  <div id="safety-banner" class="safety-banner">
    <b>CoreDB 확정 저장 방식</b>
    <span>서버 저장이 성공한 학생만 체크 상태가 확정됩니다.</span>
  </div>

  <nav id="date-strip" class="date-strip" aria-label="녹음 대상 날짜"></nav>

  <section id="notice-banner" class="notice-banner neutral">
    <div>
      <b id="notice-title">공지 상태 확인 중</b>
      <span id="notice-detail">선택 날짜의 서버 상태를 읽고 있습니다.</span>
    </div>
    <span id="deadline-badge" class="deadline-badge">-</span>
  </section>

  <div class="statusbar">
    <div class="metric"><span>대상</span><b id="m-total">-</b></div>
    <div class="metric"><span>제출</span><b id="m-received">-</b></div>
    <div class="metric"><span id="m-pending-label">남음</span><b id="m-pending">-</b></div>
  </div>

  <div id="classes" aria-live="polite"></div>
  <div id="empty" class="empty" hidden></div>

  <footer>
    <span id="authoritative-read">서버 확인 전</span>
    <span>v8.0.0</span>
  </footer>
</main>

<div id="setup-modal" class="modal">
  <div class="sheet">
    <h2>녹음체크 서버 연결</h2>
    <p class="setup-note">Apps Script 웹앱 실행 주소와 관리자 PIN을 입력하세요. 기존 주소는 그대로 사용합니다.</p>
    <div class="field"><label for="api-url">Apps Script API 주소</label><input id="api-url" inputmode="url" autocomplete="url" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="field"><label for="admin-pin">관리자 PIN</label><input id="admin-pin" inputmode="numeric" maxlength="12" type="password" autocomplete="one-time-code" placeholder="6자리 PIN"></div>
    <button class="btn primary full" type="button" onclick="connectServer()">연결하고 시작</button>
    <button class="btn secondary full" type="button" onclick="closeSetupIfConnected()">취소</button>
  </div>
</div>

<div id="settings-modal" class="modal" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <h2>설정·진단</h2>
    <div class="settings-grid">
      <button class="btn secondary" type="button" onclick="readServerAgain()">서버 상태 다시 읽기</button>
      <button class="btn secondary" type="button" onclick="runAudit()">현재 날짜 진단</button>
      <button class="btn secondary" type="button" onclick="openConnectionSettings()">서버 연결 변경</button>
    </div>
    <pre id="audit-result" class="audit-result">진단 전</pre>
    <p class="setup-note">입력 원본은 CoreDB의 RecordingChecks입니다. `녹음체크_감사` 탭은 조회·감사용이며 직접 입력하지 않습니다.</p>
    <button class="btn primary full" type="button" onclick="closeSettings()">닫기</button>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script src="app.js"></script>
</body>
</html>
