<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#173e35"><title>All바른 녹음체크</title><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="icon-192.png"><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="head"><div><h1>&lt;경근T&gt; 녹음체크</h1><small id="now-label">준비 중</small></div><div class="head-actions"><span id="network-state" class="pill">온라인</span><span id="sync-state" class="pill">준비</span><button class="icon" onclick="openSettings()">설정</button></div></div></header>
<main><div id="date-strip" class="date-strip"></div><div id="banner" class="banner"><b>초경량 녹음체크</b><span>화면은 즉시 열리고 체크는 백그라운드에서 묶음 저장됩니다.</span></div><div class="statusbar"><div class="metric"><span>대상</span><b id="m-total">-</b></div><div class="metric"><span>제출</span><b id="m-received">-</b></div><div class="metric"><span>미제출</span><b id="m-missing">-</b></div></div><div class="actions"><button id="publish-btn" class="btn primary" onclick="publishNow()">미제출 공지 지금 게시</button><button class="btn secondary" onclick="loadData('',true)">새로고침</button></div><div id="classes"></div></main>
<div id="setup-modal" class="modal"><div class="sheet"><h2>처음 연결</h2><p class="setup-note">녹음 서버의 Apps Script 웹앱 실행 주소와 설치 함수가 보여준 6자리 관리자 PIN을 입력하세요. 주소와 세션은 이 기기에만 저장됩니다.</p><div class="field"><label>Apps Script API 주소</label><input id="api-url" inputmode="url" placeholder="https://script.google.com/macros/s/.../exec"></div><div class="field"><label>관리자 PIN</label><input id="admin-pin" inputmode="numeric" maxlength="12" type="password" placeholder="6자리 PIN"></div><button class="btn primary" style="width:100%" onclick="connectServer()">연결하고 시작</button><button class="btn secondary" style="width:100%;margin-top:8px" onclick="closeSetupIfConnected()">취소</button></div></div>
<div id="settings-modal" class="modal" onclick="if(event.target===this)closeSettings()"><div class="sheet"><h2>설정</h2><div class="actions"><button class="btn secondary" onclick="openConnectionSettings()">서버 연결 변경</button><button class="btn secondary" onclick="flushQueue(true)">미전송 다시 보내기</button></div><div id="settings-list"></div><button class="btn primary" style="width:100%;margin-top:14px" onclick="closeSettings()">닫기</button></div></div><div id="toast" class="toast"></div><script src="app.js"></script></body></html>
