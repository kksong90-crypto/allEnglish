<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173e35">
  <title>All바른 운영 퀵앱</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="app-header">
  <div>
    <h1>&lt;경근T&gt; 운영 퀵앱</h1>
    <small id="header-sub">준비 중</small>
  </div>
  <div class="header-actions">
    <span id="network-state" class="pill">온라인</span>
    <span id="sync-state" class="pill">준비</span>
    <button class="icon-btn" onclick="openSettings()">설정</button>
  </div>
</header>

<div id="install-banner" class="install-banner hidden">
  <div><b>홈 화면에 설치</b><span>운영센터를 열지 않고 바로 처리할 수 있습니다.</span></div>
  <button onclick="installApp()">설치</button>
  <button class="ghost" onclick="dismissInstall()">닫기</button>
</div>

<main id="app-main">
  <section id="tab-home" class="tab-panel active"></section>
  <section id="tab-retest" class="tab-panel"></section>
  <section id="tab-score" class="tab-panel"></section>
  <section id="tab-absence" class="tab-panel"></section>
  <section id="tab-notice" class="tab-panel"></section>
</main>

<nav class="bottom-nav">
  <button class="active" data-tab="home" onclick="switchTab('home')"><span>홈</span></button>
  <button data-tab="retest" onclick="switchTab('retest')"><span>재시험</span></button>
  <button data-tab="score" onclick="switchTab('score')"><span>학교성적</span></button>
  <button data-tab="absence" onclick="switchTab('absence')"><span>예정결석</span></button>
  <button data-tab="notice" onclick="switchTab('notice')"><span>공지</span></button>
</nav>

<div id="setup-modal" class="modal show">
  <div class="sheet">
    <h2>서버 연결</h2>
    <p>녹음 앱과 같은 Apps Script API 주소와 관리자 PIN을 사용합니다. 이미 녹음 앱에 연결했다면 자동으로 넘어갑니다.</p>
    <label>Apps Script API 주소<input id="api-url" inputmode="url" placeholder="https://script.google.com/macros/s/.../exec"></label>
    <label>관리자 PIN<input id="admin-pin" type="password" inputmode="numeric" maxlength="12" placeholder="6자리 PIN"></label>
    <button class="btn primary full" onclick="connectServer()">연결하고 시작</button>
    <button class="btn secondary full" onclick="closeSetupIfConnected()">취소</button>
  </div>
</div>

<div id="form-modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet large">
    <div class="modal-head"><div><small id="modal-eyebrow"></small><h2 id="modal-title"></h2></div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="settings-modal" class="modal" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <h2>설정</h2>
    <a class="btn secondary full link-btn" href="../recording/">녹음 확인 앱 열기</a>
    <button class="btn secondary full" onclick="openConnectionSettings()">서버 연결 변경</button>
    <button class="btn secondary full" onclick="flushQueue(true)">미전송 작업 다시 보내기</button><label style="margin-top:12px">시험기간 모드<select id="exam-mode-setting" onchange="saveExamMode(this.value)"><option value="AUTO">자동</option><option value="ON">항상 켜기</option><option value="OFF">항상 끄기</option></select></label>
    <button class="btn secondary full" onclick="forceRefresh()">전체 새로고침</button>
    <button class="btn primary full" onclick="closeSettings()">닫기</button>
  </div>
</div>

<div id="undo-bar" class="undo-bar"><span id="undo-text"></span><button onclick="undoLastAction()">되돌리기</button></div>
<div id="toast" class="toast"></div>
<script src="app.js"></script>
</body>
</html>
