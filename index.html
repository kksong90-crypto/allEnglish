<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3f6158" />

  <title>All바른 English</title>

  <!-- PWA / Icon -->
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="All바른 English" />

  <style>
    /************************************************************
     *  1. 기본 설정
     ************************************************************/
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f2;
      font-size: 18px;
    }

    body {
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    input,
    textarea {
      -webkit-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
    }

    /************************************************************
     *  2. 로그인 화면
     ************************************************************/
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4f2;
      padding: 1.3em;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 18px;
      padding: 1.8em;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
      text-align: center;
    }

    .login-box h2 {
      margin: 0 0 0.4em;
      color: #3f6158;
      font-size: 1.65em;
    }

    .login-box p {
      margin: 0.3em 0 1em;
      color: #52645f;
    }

    .login-box input {
      width: 100%;
      padding: 0.9em;
      margin: 0.55em 0;
      font-size: 1.05em;
      border: 1px solid #bbb;
      border-radius: 10px;
    }

    .login-box button {
      width: 100%;
      margin-top: 0.8em;
      background: #3f6158;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.9em;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
    }

    .login-error {
      margin-top: 1em;
      color: #c0392b;
      font-weight: bold;
      line-height: 1.5;
    }

    /************************************************************
     *  3. 상단 제목 / 사용자 정보 / 탭 메뉴
     ************************************************************/
    header {
      background: #3f6158;
      color: white;
      padding: 1em;
      text-align: center;
      font-size: 1.8em;
      font-weight: bold;
    }

    .top-user-bar {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      padding: 0.6em 0.9em;
      background: #eef7f3;
      color: #3f6158;
      font-size: 0.95em;
      border-bottom: 1px solid #c8ddd5;
    }

    .top-user-bar button {
      border: 1px solid #3f6158;
      background: white;
      color: #3f6158;
      border-radius: 8px;
      padding: 0.4em 0.65em;
      font-weight: bold;
      cursor: pointer;
    }

    .top-user-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }

    .modal-screen {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1.2em;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9998;
    }

    .modal-box {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 18px;
      padding: 1.5em;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .modal-box h3 {
      margin: 0 0 0.8em;
      color: #3f6158;
    }

    .modal-box input {
      width: 100%;
    }

    .modal-message {
      min-height: 1.4em;
      margin-top: 0.8em;
      font-weight: bold;
      color: #c0392b;
    }

    .modal-message.success {
      color: #1b7f3a;
    }

    nav {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      background: #dcedc8;
      justify-content: space-around;
      padding: 0;
      border-bottom: 2px solid #a0c79b;
    }

    nav button {
      flex: 1;
      min-width: 95px;
      background: none;
      border: none;
      font-size: 1.08em;
      font-weight: bold;
      color: #3f6158;
      cursor: pointer;
      padding: 1em 0.45em;
      border-bottom: 4px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }

    nav button.active {
      border-bottom: 4px solid #3f6158;
      background: #e6f4dc;
    }

    #admin-tab-button {
      display: none;
    }

    /************************************************************
     *  4. 공통 화면 요소
     ************************************************************/
    section {
      padding: 1.5em;
      display: none;
    }

    section.active {
      display: block;
    }

    .section-title {
      font-size: 1.4em;
      margin-bottom: 0.7em;
      color: #3f6158;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin: 1em 0;
      padding: 1.2em;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .mini-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
      padding: 0.9em;
      margin: 0.7em 0;
      line-height: 1.5;
    }

    .muted {
      color: #6b7774;
      font-size: 0.95em;
    }

    .notice-small {
      font-size: 0.92em;
      color: #52645f;
      line-height: 1.45;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 0.7em;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 0.9em;
      text-align: center;
      word-break: break-word;
      line-height: 1.45;
    }

    th {
      background: #eef7f3;
      color: #2f5f53;
    }

    select,
    input[type="date"],
    input[type="text"],
    input[type="password"] {
      padding: 0.75em;
      margin: 0.8em 0;
      font-size: 1.05em;
      width: 100%;
      display: block;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: white;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin: 12px 0 18px;
      align-items: stretch;
    }

    .vocab-btn,
    .small-btn {
      flex: 1;
      background: #3f6158;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.9em;
      font-size: 1.02em;
      font-weight: bold;
      cursor: pointer;
    }

    .small-btn {
      flex: none;
      padding: 0.55em 0.8em;
      font-size: 0.9em;
    }

    .vocab-btn.secondary,
    .small-btn.secondary {
      background: #6f8f86;
    }

    .vocab-btn.warning,
    .small-btn.warning {
      background: #b0574f;
    }

    .vocab-question {
      background: white;
      border-radius: 14px;
      padding: 1em;
      margin: 1em 0;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
    }

    .vocab-question b {
      display: block;
      margin-bottom: 0.5em;
      color: #3f6158;
    }

    .result-correct {
      color: #1b7f3a;
      font-weight: bold;
    }

    .result-wrong {
      color: #c0392b;
      font-weight: bold;
    }

    /************************************************************
     *  5. 발음 / 중요단어 / 검색
     ************************************************************/
    .speak-word {
      cursor: pointer;
      font-weight: bold;
      color: #2f5f53;
    }

    .speak-word:hover {
      text-decoration: underline;
    }

    .speak-btn,
    .star-btn {
      border: none;
      background: #edf5f2;
      color: #2f5f53;
      border-radius: 8px;
      padding: 0.35em 0.55em;
      font-size: 1em;
      cursor: pointer;
    }

    .star-btn {
      background: none;
      font-size: 1.35em;
    }

    .speak-btn:hover {
      background: #d9ebe5;
    }

    .folder-toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      margin: 0.8em 0;
    }

    .progress-box {
      background: #f8fcfa;
      border: 1px solid #d6e8e1;
      border-radius: 12px;
      padding: 0.9em;
      margin: 0.8em 0;
      font-size: 0.95em;
      line-height: 1.55;
    }

    /************************************************************
     *  6. 로딩 / 모드 전환
     ************************************************************/
    #loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 60vh;
      transition: opacity 0.3s ease;
    }

    #loader.hidden {
      display: none;
    }

    .loader-text {
      margin-top: 1em;
      color: #3f6158;
      font-weight: bold;
      font-size: 1.2em;
    }

    .mode-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #fff;
      border: 1px solid #ccc;
      padding: 0.5em 1em;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      z-index: 100;
    }

    /************************************************************
     *  7. 다크모드
     ************************************************************/
    body.dark {
      background: #1a1a1a;
      color: #e0e0e0;
    }

    body.dark #login-screen {
      background: #1a1a1a;
    }

    body.dark .login-box,
    body.dark .modal-box,
    body.dark .card,
    body.dark .mini-card,
    body.dark table,
    body.dark .vocab-question,
    body.dark .progress-box {
      background: #2a2a2a;
      color: #f0f0f0;
      border-color: #444;
    }

    body.dark header,
    body.dark nav,
    body.dark .top-user-bar {
      background: #333;
      color: white;
    }

    body.dark nav button {
      color: #e0e0e0;
    }

    body.dark nav button.active {
      background: #444;
      border-bottom-color: #dcedc8;
    }

    body.dark input,
    body.dark select {
      background: #222;
      color: #f0f0f0;
      border-color: #555;
    }

    body.dark .section-title,
    body.dark .vocab-question b,
    body.dark .speak-word {
      color: #dcedc8;
    }

    body.dark th {
      background: #333;
      color: #dcedc8;
    }

    body.dark .speak-btn {
      background: #333;
      color: #d7fff4;
    }

    body.dark .muted,
    body.dark .notice-small {
      color: #c8c8c8;
    }

    /************************************************************
     *  8. 모바일
     ************************************************************/
    @media (max-width: 600px) {
      html,
      body {
        font-size: 17px;
      }

      header {
        font-size: 1.55em;
        padding: 0.9em;
      }

      nav button {
        font-size: 1em;
        padding: 0.8em 0.35em;
        min-width: 88px;
      }

      section {
        padding: 1em;
      }

      .section-title {
        font-size: 1.2em;
      }

      th,
      td {
        padding: 0.72em 0.42em;
        font-size: 0.92em;
      }

      .button-row,
      .folder-toolbar {
        display: flex;
        flex-direction: column;
      }

      .mode-toggle {
        font-size: 0.85em;
        padding: 0.45em 0.7em;
      }
    }
  </style>
</head>

<body>
  <!-- 로그인 -->
  <div id="login-screen">
    <div class="login-box">
      <h2>All바른 English</h2>
      <p>학생 ID와 비밀번호를 입력하세요.</p>

      <input
        type="text"
        id="login-id"
        placeholder="ID 입력"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />

      <input
        type="password"
        id="login-pw"
        placeholder="비밀번호 입력"
        autocomplete="off"
        onkeydown="if(event.key === 'Enter') checkLogin();"
      />

      <button onclick="checkLogin()">로그인</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- 비밀번호 변경 -->
  <div id="password-modal" class="modal-screen">
    <div class="modal-box">
      <h3>🔐 비밀번호 변경</h3>
      <p>현재 비밀번호와 새 비밀번호를 입력하세요.</p>

      <input
        type="password"
        id="old-password"
        placeholder="현재 비밀번호"
        autocomplete="current-password"
      />

      <input
        type="password"
        id="new-password"
        placeholder="새 비밀번호"
        autocomplete="new-password"
      />

      <input
        type="password"
        id="new-password-confirm"
        placeholder="새 비밀번호 확인"
        autocomplete="new-password"
        onkeydown="if(event.key === 'Enter') changeMyPassword();"
      />

      <div class="button-row">
        <button class="vocab-btn" onclick="changeMyPassword()">변경하기</button>
        <button class="vocab-btn secondary" onclick="closePasswordModal()">닫기</button>
      </div>

      <div id="password-message" class="modal-message"></div>
    </div>
  </div>

  <button class="mode-toggle" onclick="toggleMode()">🌗 모드 전환</button>

  <header>All바른 English</header>

  <div class="top-user-bar">
    <div id="user-label">로그인이 필요합니다.</div>
    <div class="top-user-buttons">
      <button onclick="openPasswordModal()">비밀번호 변경</button>
      <button onclick="logout()">로그아웃</button>
    </div>
  </div>

  <nav>
    <button onclick="showTab('notice')" class="active">공지사항</button>
    <button onclick="showTab('exam')">시험정보</button>
    <button onclick="showTab('retest')">재시험</button>
    <button onclick="showTab('vocab')">단어장</button>
    <button onclick="showTab('favorites')">⭐중요단어</button>
    <button id="admin-tab-button" onclick="showTab('admin')">관리자</button>
  </nav>

  <!-- 공지사항 -->
  <section id="notice" class="active">
    <div class="section-title">📌 공지사항</div>
    <div id="notice-content"></div>
  </section>

  <!-- 시험정보 -->
  <section id="exam">
    <div class="section-title">📝 시험정보</div>
    <input type="date" id="exam-date" />
    <select id="class-select"></select>
    <div id="exam-table"></div>
  </section>

  <!-- 재시험 -->
  <section id="retest">
    <div class="section-title">🔁 재시험 명단</div>
    <div id="retest-table"></div>
  </section>

  <!-- 단어장 -->
  <section id="vocab">
    <div class="section-title">📘 단어장</div>

    <select id="vocab-book-select"></select>
    <select id="vocab-day-select"></select>

    <div class="button-row">
      <button class="vocab-btn secondary" onclick="moveDay(-1)">← 이전 Day</button>
      <button class="vocab-btn secondary" onclick="moveDay(1)">다음 Day →</button>
    </div>

    <div class="mini-card">
      <b>중요단어 저장 폴더</b>
      <div id="folder-control-vocab"></div>
    </div>

    <div class="mini-card">
      <b>단어 검색</b>
      <input
        type="text"
        id="vocab-search-input"
        placeholder="영어 또는 뜻 검색"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        onkeydown="if(event.key === 'Enter') searchVocab();"
      />
      <select id="vocab-search-scope">
        <option value="current-day">현재 Day에서 검색</option>
        <option value="current-book">현재 단어장에서 검색</option>
        <option value="all">전체 단어장에서 검색</option>
      </select>
      <div class="button-row">
        <button class="vocab-btn" onclick="searchVocab()">검색</button>
        <button class="vocab-btn secondary" onclick="clearVocabSearch()">검색 초기화</button>
      </div>
      <div id="vocab-search-result"></div>
    </div>

    <div id="vocab-progress"></div>
    <div id="vocab-view"></div>
  </section>

  <!-- 중요단어 -->
  <section id="favorites">
    <div class="section-title">⭐ 중요 단어장</div>
    <div id="folder-control-favorites"></div>
    <div id="favorites-view"></div>

    <div class="section-title" style="margin-top:1.4em;">📕 누적 오답노트</div>
    <div class="button-row">
      <button class="vocab-btn" onclick="loadMyWrongNote()">누적 오답 보기</button>
      <button class="vocab-btn secondary" onclick="startServerWrongNoteTest()">누적 오답 시험</button>
    </div>
    <div id="wrong-note-view"></div>
  </section>

  <!-- 관리자 -->
  <section id="admin">
    <div class="section-title">⚙️ 관리자</div>
    <div class="card">
      관리자 계정으로 로그인한 경우에만 사용할 수 있습니다.
      Users 시트의 권한 열에 admin 또는 teacher를 입력하면 관리자 기능이 열립니다.
    </div>

    <div class="button-row">
      <button class="vocab-btn" onclick="refreshAdminSummary()">관리자 현황 새로고침</button>
      <button class="vocab-btn secondary" onclick="runVocabErrorCheck()">Vocab 오류 검사</button>
    </div>

    <div class="button-row">
      <button class="vocab-btn secondary" onclick="fillOrderNumbersFromAdmin()">E열 정렬번호 채우기</button>
      <button class="vocab-btn warning" onclick="makeSpreadsheetBackup()">TestManager 백업 만들기</button>
    </div>

    <div id="admin-view"></div>
  </section>

  <!-- 로딩 -->
  <div id="loader">
    <svg width="50" height="50" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid">
      <circle cx="50" cy="50" r="35" stroke-width="10" stroke="#3f6158"
        stroke-dasharray="164.93361431346415 56.97787143782138" fill="none"
        stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
          dur="1s" values="0 50 50;360 50 50" keyTimes="0;1" />
      </circle>
    </svg>
    <div class="loader-text">로딩중...</div>
  </div>

  <script>
    /************************************************************
     *  1. 기본 설정 / 전역 변수
     ************************************************************/
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzyk-n_G93BJG1vlck6DNakEdZolCSoB9I3ylmyN2e6qX9NNHdQYgx6phA4OU9JAwfT/exec";

    const DEFAULT_FOLDER_NAME = "기본";
    const MAX_RANDOM_TEST_COUNT = 25;

    let currentUser = null;
    let vocabData = [];
    let currentVocabWords = [];
    let wrongWords = [];
    let serverWrongWords = [];
    let vocabHiddenMode = false;
    let favoriteFolders = { [DEFAULT_FOLDER_NAME]: [] };
    let currentFavoriteFolder = DEFAULT_FOLDER_NAME;
    let currentTestMeta = null;
    let testAlreadySaved = false;

    /************************************************************
     *  2. 공통 유틸 함수
     ************************************************************/
    function cleanDate(isoDate) {
      if (!isoDate) return "";
      const d = new Date(isoDate);
      if (isNaN(d.getTime())) return isoDate;
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeAnswer(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[.?!,;:'"()\[\]{}]/g, "")
        .replace(/\s+/g, "");
    }

    function shuffleArray(array) {
      return [...array]
        .map(value => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(item => item.value);
    }

    function makeWordKey(row) {
      return [row[0], row[1], row[2]].map(x => String(x ?? "")).join("|");
    }

    function sortWordsByOrder(rows) {
      return [...rows].sort((a, b) => {
        const orderA = Number(a[4]) || 999999;
        const orderB = Number(b[4]) || 999999;
        return orderA - orderB;
      });
    }

    function makeAnswerInput(index) {
      return `
        <input

    async function fetchSheet(sheetName) {
      const res = await fetch(SHEET_URL + "?sheetName=" + encodeURIComponent(sheetName));
      return await res.json();
    }

    async function apiGet(params) {
      const query = new URLSearchParams(params);
      if (currentUser && currentUser.token && !query.has("token")) {
        query.set("token", currentUser.token);
      }

      const res = await fetch(SHEET_URL + "?" + query.toString());
      return await res.json();
    }

    async function apiPost(params) {
      const body = new URLSearchParams(params);
      if (currentUser && currentUser.token && !body.has("token")) {
        body.set("token", currentUser.token);
      }

      const res = await fetch(SHEET_URL, {
        method: "POST",
        body
      });
      return await res.json();
    }

    function restoreLogin() {
      try {
        currentUser = JSON.parse(sessionStorage.getItem("allbarun-user") || "null");
      } catch (err) {
        currentUser = null;
      }

      if (currentUser && currentUser.token) {

    async function checkLogin() {
      const id = document.getElementById("login-id").value.trim();
      const pw = document.getElementById("login-pw").value.trim();
      const error = document.getElementById("login-error");

      if (!id || !pw) {
        error.textContent = "ID와 비밀번호를 모두 입력하세요.";
        return;
      }

      error.textContent = "로그인 확인 중입니다...";

      try {
        const result = await apiGet({ action: "login", id, pw });

        if (!result.success) {
          error.textContent = result.message || "로그인에 실패했습니다.";
          return;
        }

        currentUser = {
          id: result.id,
          name: result.name,
          className: result.className || "",
          role: result.role || "student",
          token: result.token
        };

        sessionStorage.setItem("allbarun-user", JSON.stringify(currentUser));
        afterLogin();
      } catch (err) {
        error.textContent = "로그인 API 연결에 실패했습니다. Apps Script 배포 상태를 확인하세요.";
      }
    }

    function afterLogin() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("user-label").textContent =
        `${currentUser.name || currentUser.id} ${currentUser.className ? "(" + currentUser.className + ")" : ""}`;

        return;
      }

      document.getElementById("password-modal").style.display = "flex";

    async function changeMyPassword() {
      const oldPw = document.getElementById("old-password").value.trim();
      const newPw = document.getElementById("new-password").value.trim();
      const confirmPw = document.getElementById("new-password-confirm").value.trim();
      const message = document.getElementById("password-message");

      message.classList.remove("success");

      if (!oldPw || !newPw || !confirmPw) {
        message.textContent = "현재 비밀번호와 새 비밀번호를 모두 입력하세요.";
        return;
      }

      if (newPw.length < 4) {
        message.textContent = "새 비밀번호는 최소 4자리 이상으로 설정하세요.";
        return;
      }

      if (newPw !== confirmPw) {
        message.textContent = "새 비밀번호와 확인 입력이 서로 다릅니다.";
        return;
      }

      if (oldPw === newPw) {
        message.textContent = "현재 비밀번호와 다른 새 비밀번호를 입력하세요.";
        return;
      }

      message.textContent = "비밀번호를 변경하는 중입니다...";

      try {
        const result = await apiPost({
          action: "changePassword",
          oldPw,
          newPw
        });

        if (!result.success) {
          message.textContent = result.message || "비밀번호 변경에 실패했습니다.";
          return;
        }

        message.textContent = "비밀번호가 변경되었습니다. 다음 로그인부터 새 비밀번호를 사용하세요.";
        message.classList.add("success");

        document.getElementById("old-password").value = "";
        document.getElementById("new-password").value = "";
        document.getElementById("new-password-confirm").value = "";
      } catch (err) {
        message.textContent = "비밀번호 변경 API 연결에 실패했습니다.";
      }
    }

    function speakWord(text) {
      if (!("speechSynthesis" in window)) {
        alert("이 기기에서는 음성 재생을 지원하지 않습니다.");
        return;
      }

      const word = String(text || "").trim();
      if (!word) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.85;
      utterance.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const preferredVoice =
        voices.find(v => v.lang === "en-US" && v.name.toLowerCase().includes("google")) ||
        voices.find(v => v.lang === "en-US") ||
        voices.find(v => v.lang.startsWith("en"));

      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }

      window.speechSynthesis.speak(utterance);
    }

    async function loadVocabBooks() {
      const target = document.getElementById("vocab-view");

      try {
        vocabData = await fetchSheet("Vocab");

        if (!Array.isArray(vocabData) || vocabData.length < 2) {
          target.innerHTML = "<div class='card'>Vocab 시트에 단어 데이터가 없습니다.</div>";
          return;
        }

        const bookSelect = document.getElementById("vocab-book-select");
        const daySelect = document.getElementById("vocab-day-select");

        const bookMap = new Map();
        vocabData.slice(1).forEach(row => {
          const book = row[0];
          const order = Number(row[4]) || 999999;
          if (!book || String(book).trim() === "") return;
          if (!bookMap.has(book)) bookMap.set(book, order);
          else bookMap.set(book, Math.min(bookMap.get(book), order));
        });

        const books = [...bookMap.entries()]
          .sort((a, b) => a[1] - b[1])
          .map(item => item[0]);

        if (books.length === 0) {
          target.innerHTML = "<div class='card'>단어장 이름이 없습니다. Vocab 시트 A열을 확인하세요.</div>";
          return;
        }

        bookSelect.innerHTML =
          `<option value="">단어장 선택</option>` +
          books.map(book => `<option value="${escapeHtml(book)}">${escapeHtml(book)}</option>`).join("");

        daySelect.innerHTML = `<option value="">Day 선택</option>`;
        target.innerHTML = "<div class='card'>단어장과 Day를 선택하세요.</div>";

        bookSelect.addEventListener("change", loadVocabDays);
        daySelect.addEventListener("change", showVocabList);
      } catch (err) {
        target.innerHTML = "<div class='card'>Vocab 시트를 불러오지 못했습니다. TestManager에 Vocab 시트가 있는지 확인하세요.</div>";
      }
    }

    async function loadVocabDays() {
      const selectedBook = document.getElementById("vocab-book-select").value;
      const daySelect = document.getElementById("vocab-day-select");
      const target = document.getElementById("vocab-view");
      document.getElementById("vocab-progress").innerHTML = "";
      document.getElementById("vocab-search-result").innerHTML = "";

      if (!selectedBook) {
        daySelect.innerHTML = `<option value="">Day 선택</option>`;
        target.innerHTML = "<div class='card'>단어장을 먼저 선택하세요.</div>";
        return;
      }

      const dayMap = new Map();
      vocabData.slice(1)
        .filter(row => String(row[0]) === String(selectedBook))
        .forEach(row => {
          const day = row[1];
          const order = Number(row[4]) || 999999;
          if (day === "" || day === null || day === undefined) return;
          if (!dayMap.has(day)) dayMap.set(day, order);
          else dayMap.set(day, Math.min(dayMap.get(day), order));
        });

      const days = [...dayMap.entries()]
        .sort((a, b) => a[1] - b[1])
        .map(item => item[0]);

      daySelect.innerHTML =
        `<option value="">Day 선택</option>` +
        days.map(day => `<option value="${escapeHtml(day)}">${escapeHtml(day)}</option>`).join("");

      target.innerHTML = "<div class='card'>Day를 선택하세요.</div>";
    }

    function getSelectedVocabWords() {
      const selectedBook = document.getElementById("vocab-book-select").value;
      const selectedDay = document.getElementById("vocab-day-select").value;

      if (!selectedBook || !selectedDay) return [];

      return sortWordsByOrder(
        vocabData.slice(1).filter(row =>
          String(row[0]) === String(selectedBook) &&
          String(row[1]) === String(selectedDay) &&
          row[2] &&
          row[3]
        )
      );
    }

    function moveDay(direction) {
      const daySelect = document.getElementById("vocab-day-select");
      const options = [...daySelect.options].filter(opt => opt.value !== "");
      if (options.length === 0) return;

      const currentValue = daySelect.value;
      let index = options.findIndex(opt => opt.value === currentValue);

      if (index === -1) {
        index = direction > 0 ? 0 : options.length - 1;
      } else {
        index += direction;
        if (index < 0) index = 0;
        if (index >= options.length) index = options.length - 1;
      }

      daySelect.value = options[index].value;
      showVocabList();
    }

    /************************************************************
     *  7. 중요단어 폴더
     ************************************************************/
    function favoriteStorageKey() {
      const userId = currentUser?.id || "guest";
      return `favoriteFolders:${userId}`;
    }

    function currentFolderStorageKey() {
      const userId = currentUser?.id || "guest";
      return `currentFavoriteFolder:${userId}`;
    }

    function loadFavoriteFolders() {
      try {
        favoriteFolders = JSON.parse(localStorage.getItem(favoriteStorageKey()) || "null");
      } catch (err) {
        favoriteFolders = null;
      }

      if (!favoriteFolders || typeof favoriteFolders !== "object" || Array.isArray(favoriteFolders)) {
        favoriteFolders = { [DEFAULT_FOLDER_NAME]: [] };
      }

      if (!favoriteFolders[DEFAULT_FOLDER_NAME]) {
        favoriteFolders[DEFAULT_FOLDER_NAME] = [];
      }

      const legacy = JSON.parse(localStorage.getItem("favoriteWords") || "[]");
      if (Array.isArray(legacy) && legacy.length > 0 && !localStorage.getItem("favoriteWordsMigrated")) {
        favoriteFolders[DEFAULT_FOLDER_NAME] = [...new Set([...favoriteFolders[DEFAULT_FOLDER_NAME], ...legacy])];
        localStorage.setItem("favoriteWordsMigrated", "Y");
      }

      const savedFolder = localStorage.getItem(currentFolderStorageKey());
      currentFavoriteFolder = favoriteFolders[savedFolder] ? savedFolder : DEFAULT_FOLDER_NAME;
      saveFavoriteFolders();
    }

    function saveFavoriteFolders() {
      localStorage.setItem(favoriteStorageKey(), JSON.stringify(favoriteFolders));
      localStorage.setItem(currentFolderStorageKey(), currentFavoriteFolder);
    }

    function getCurrentFolderWords() {
      return favoriteFolders[currentFavoriteFolder] || [];
    }

    function isFavoriteInCurrentFolder(key) {
      return getCurrentFolderWords().includes(key);
    }

    function renderFolderControls() {
      const folderNames = Object.keys(favoriteFolders);
      const options = folderNames
        .map(name => `<option value="${escapeHtml(name)}" ${name === currentFavoriteFolder ? "selected" : ""}>${escapeHtml(name)}</option>`)
        .join("");

      const html = `
        <div class="folder-toolbar">
          <select onchange="changeFavoriteFolder(this.value)">${options}</select>
          <button class="small-btn" onclick="createFavoriteFolder()">새 폴더</button>
          <button class="small-btn secondary" onclick="renameFavoriteFolder()">이름 변경</button>
          <button class="small-btn warning" onclick="deleteFavoriteFolder()">삭제</button>
        </div>
        <div class="notice-small">현재 선택된 폴더에 중요단어가 저장됩니다.</div>
      `;

      document.getElementById("folder-control-vocab").innerHTML = html;
      document.getElementById("folder-control-favorites").innerHTML = html;
    }

    function changeFavoriteFolder(folderName) {
      if (!favoriteFolders[folderName]) return;
      currentFavoriteFolder = folderName;
      saveFavoriteFolders();
      renderFolderControls();

      if (document.getElementById("favorites").classList.contains("active")) {
        showFavorites();
      }

      if (document.getElementById("vocab").classList.contains("active")) {
        showVocabList();
      }
    }

    function createFavoriteFolder() {
      const name = prompt("새 중요단어 폴더 이름을 입력하세요.");
      if (!name) return;

      const folderName = name.trim();
      if (!folderName) return;
      if (favoriteFolders[folderName]) {
        alert("이미 있는 폴더 이름입니다.");
        return;
      }

      favoriteFolders[folderName] = [];
      currentFavoriteFolder = folderName;
      saveFavoriteFolders();
      renderFolderControls();
      showFavorites();
    }

    function renameFavoriteFolder() {
      if (currentFavoriteFolder === DEFAULT_FOLDER_NAME) {
        alert("기본 폴더 이름은 변경하지 않는 것을 권장합니다.");
      }

      const newName = prompt("새 폴더 이름을 입력하세요.", currentFavoriteFolder);
      if (!newName) return;

      const folderName = newName.trim();
      if (!folderName || folderName === currentFavoriteFolder) return;
      if (favoriteFolders[folderName]) {
        alert("이미 있는 폴더 이름입니다.");
        return;
      }

      favoriteFolders[folderName] = favoriteFolders[currentFavoriteFolder];
      delete favoriteFolders[currentFavoriteFolder];
      currentFavoriteFolder = folderName;
      saveFavoriteFolders();
      renderFolderControls();
      showFavorites();
    }

    function deleteFavoriteFolder() {
      if (currentFavoriteFolder === DEFAULT_FOLDER_NAME) {
        alert("기본 폴더는 삭제할 수 없습니다.");
        return;
      }

      if (!confirm(`'${currentFavoriteFolder}' 폴더를 삭제할까요? 폴더 안의 중요단어도 함께 삭제됩니다.`)) {
        return;
      }

      delete favoriteFolders[currentFavoriteFolder];
      currentFavoriteFolder = DEFAULT_FOLDER_NAME;
      saveFavoriteFolders();
      renderFolderControls();
      showFavorites();
    }

    function toggleFavorite(encodedKey) {
      const key = decodeURIComponent(encodedKey);
      const list = getCurrentFolderWords();

      if (list.includes(key)) {
        favoriteFolders[currentFavoriteFolder] = list.filter(x => x !== key);
      } else {
        favoriteFolders[currentFavoriteFolder] = [...list, key];
      }

      saveFavoriteFolders();

      if (document.getElementById("favorites").classList.contains("active")) {
        showFavorites();
      } else {
        showVocabList();
      }
    }

    function toggleFavoriteFromTest(encodedKey, button) {
      const key = decodeURIComponent(encodedKey);
      const list = getCurrentFolderWords();

      if (list.includes(key)) {
        favoriteFolders[currentFavoriteFolder] = list.filter(x => x !== key);
        button.textContent = "☆";
      } else {
        favoriteFolders[currentFavoriteFolder] = [...list, key];
        button.textContent = "⭐";
      }

      saveFavoriteFolders();
    }

    function searchVocab() {
      const query = document.getElementById("vocab-search-input").value.trim().toLowerCase();
      const scope = document.getElementById("vocab-search-scope").value;
      const selectedBook = document.getElementById("vocab-book-select").value;
      const selectedDay = document.getElementById("vocab-day-select").value;
      const target = document.getElementById("vocab-search-result");

      if (!query) {
        target.innerHTML = "<div class='mini-card'>검색어를 입력하세요.</div>";
        return;
      }

      let rows = vocabData.slice(1).filter(row => row[2] && row[3]);

      if (scope === "current-day") {
        rows = rows.filter(row => String(row[0]) === String(selectedBook) && String(row[1]) === String(selectedDay));
      } else if (scope === "current-book") {
        rows = rows.filter(row => String(row[0]) === String(selectedBook));
      }

      const found = sortWordsByOrder(rows.filter(row =>
        String(row[2]).toLowerCase().includes(query) ||
        String(row[3]).toLowerCase().includes(query)
      ));

      if (found.length === 0) {
        target.innerHTML = "<div class='mini-card'>검색 결과가 없습니다.</div>";
        return;
      }

      let html = `<div class="mini-card"><b>검색 결과 ${found.length}개</b></div>`;
      html += "<table><tr><th>단어장</th><th>Day</th><th>영어</th><th>발음</th><th>뜻</th></tr>";

      found.forEach(row => {
        html += `
          <tr>
            <td>${escapeHtml(row[0])}</td>
            <td>${escapeHtml(row[1])}</td>
            <td><span class="speak-word" onclick='speakWord(${JSON.stringify(String(row[2]))})'>${escapeHtml(row[2])}</span></td>
            <td><button class="speak-btn" onclick='speakWord(${JSON.stringify(String(row[2]))})'>🔊</button></td>
            <td>${escapeHtml(row[3])}</td>
          </tr>
        `;
      });

      html += "</table>";
      target.innerHTML = html;
    }

    function startVocabTest(mode = "meaning", amount = "random") {

        : amount === "all"

          : "랜덤 25문제 단어시험";

    function renderTest(words, meta) {
      currentVocabWords = words;
      wrongWords = [];
      testAlreadySaved = false;
      currentTestMeta = meta;

      let html = `
        <div class="card">
          <b>${escapeHtml(meta.modeLabel)}</b><br>
          총 ${currentVocabWords.length}문제입니다.<br>
          ${meta.mode === "listening" ? "발음을 듣고 알맞은 영어 단어를 입력하세요." : "뜻을 보고 알맞은 영어 단어를 입력하세요."}
        </div>
      `;

      currentVocabWords.forEach((row, index) => {
        const question = meta.mode === "listening"
          ? `<button class="speak-btn" onclick='speakWord(${JSON.stringify(String(row[2]))})'>🔊 발음 듣기</button>`
          : escapeHtml(row[3]);

        html += `
          <div class="vocab-question">
            <b>Q${index + 1}. ${question}</b>
            ${makeAnswerInput(index)}
          </div>
        `;
      });

      html += `
        <button class="vocab-btn" onclick="gradeVocabTest()">채점하기</button>
        <div id="vocab-result"></div>
      `;

      document.getElementById(meta.targetId).innerHTML = html;
    }

    function gradeVocabTest() {
      let correctCount = 0;
      let resultRows = "";
      wrongWords = [];

      currentVocabWords.forEach((row, index) => {
        const correctAnswer = row[2];
        const meaning = row[3];
        const input = document.getElementById(`answer-${index}`);
        const userAnswer = input ? input.value : "";
        const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);

        if (isCorrect) {
          correctCount++;
          if (input) {
            input.style.border = "3px solid #1b7f3a";
            input.style.backgroundColor = "#e8f8ee";
          }
        } else {
          wrongWords.push(row);
          if (input) {
            input.style.border = "3px solid #c0392b";
            input.style.backgroundColor = "#fdecea";
          }
        }

        resultRows += `
          <tr>
            <td>${escapeHtml(meaning)}</td>
            <td>${escapeHtml(userAnswer || "-")}</td>
            <td>${escapeHtml(correctAnswer)}</td>
            <td class="${isCorrect ? "result-correct" : "result-wrong"}">${isCorrect ? "정답" : "오답"}</td>
          </tr>
        `;
      });

      const score = Math.round((correctCount / currentVocabWords.length) * 100);

      let resultHtml = `
        <div class="card">
          <b>채점 결과</b><br>
          ${currentVocabWords.length}문제 중 ${correctCount}개 정답<br>
          점수: ${score}점
          <div id="save-result-status" class="notice-small">결과 저장 중...</div>
        </div>

        <table>
          <tr>
            <th>뜻</th>
            <th>내 답</th>
            <th>정답</th>
            <th>결과</th>
          </tr>
          ${resultRows}
        </table>
      `;

      if (wrongWords.length > 0) {
        resultHtml += renderWrongNoteHtml();
      }

      const resultTarget = document.getElementById("vocab-result");
      resultTarget.innerHTML = resultHtml;
      resultTarget.scrollIntoView({ behavior: "smooth" });

      saveResultToServer(correctCount, score);
    }

    async function saveResultToServer(correctCount, score) {
      if (testAlreadySaved) return;
      testAlreadySaved = true;

      const status = document.getElementById("save-result-status");
      const meta = currentTestMeta || {};
      const first = currentVocabWords[0] || [];
      const book = meta.book || first[0] || "";
      const day = meta.day || first[1] || "";

      try {
        const wrongPayload = wrongWords.map(row => ({
          book: row[0],
          day: row[1],
          english: row[2],
          meaning: row[3]
        }));

        const result = await apiPost({
          action: "saveVocabResult",
          book,
          day,
          mode: meta.modeLabel || meta.mode || "단어시험",
          total: currentVocabWords.length,
          correct: correctCount,
          score,
          wrongJson: JSON.stringify(wrongPayload)
        });

        if (status) {
          status.textContent = result.success ? "결과가 저장되었습니다." : (result.message || "결과 저장 실패");
        }
      } catch (err) {
        if (status) status.textContent = "결과 저장에 실패했습니다. Apps Script 설정을 확인하세요.";
      }
    }

     ************************************************************/
    window.onload = async () => {
      try {
        restoreLogin();

        await Promise.all([
          loadNotice(),
          loadClassDropdown(),
          loadRetest(),
          loadVocabBooks()
        ]);

        document.getElementById("exam-date").addEventListener("change", loadExam);
        document.getElementById("class-select").addEventListener("change", loadExam);
      } catch (err) {
        console.error(err);
      } finally {
        setTimeout(() => {
          document.getElementById("loader").classList.add("hidden");
        }, 500);
      }
    };
  </script>
