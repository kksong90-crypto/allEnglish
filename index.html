<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3f6158" />
  <title>All바른 English</title>
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="All바른 English" />
  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f2;
      font-size: 18px;
    }

    header {
      background: #3f6158;
      color: white;
      padding: 1em;
      text-align: center;
      font-size: 1.8em;
      font-weight: bold;
    }

    nav {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      background: #dcedc8;
      justify-content: space-around;
      padding: 0;
      border-bottom: 2px solid #a0c79b;
    }

    nav button {
      flex: 1;
      min-width: 95px;
      background: none;
      border: none;
      font-size: 1.15em;
      font-weight: bold;
      color: #3f6158;
      cursor: pointer;
      padding: 1em 0.45em;
      border-bottom: 4px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }

    nav button.active {
      border-bottom: 4px solid #3f6158;
      background: #e6f4dc;
    }

    section {
      padding: 1.5em;
      display: none;
    }

    section.active {
      display: block;
    }

    .section-title {
      font-size: 1.4em;
      margin-bottom: 0.7em;
      color: #3f6158;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      margin: 1em 0;
      padding: 1.2em;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 1.0em;
      text-align: center;
      word-break: break-word;
      line-height: 1.45;
    }

    select, input[type="date"], input[type="text"] {
      padding: 0.75em;
      margin: 0.8em 0;
      font-size: 1.1em;
      width: 100%;
      display: block;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: white;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .vocab-btn {
      flex: 1;
      background: #3f6158;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.9em;
      font-size: 1.05em;
      font-weight: bold;
      cursor: pointer;
    }

    .vocab-btn.secondary {
      background: #6f8f86;
    }

    .vocab-question {
      background: white;
      border-radius: 14px;
      padding: 1em;
      margin: 1em 0;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }

    .vocab-question b {
      display: block;
      margin-bottom: 0.5em;
      color: #3f6158;
    }

    .result-correct {
      color: #1b7f3a;
      font-weight: bold;
    }

    .result-wrong {
      color: #c0392b;
      font-weight: bold;
    }

    #loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 60vh;
      transition: opacity 0.3s ease;
    }

    #loader.hidden { display: none; }

    .loader-text {
      margin-top: 1em;
      color: #3f6158;
      font-weight: bold;
      font-size: 1.2em;
    }

    .mode-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #fff;
      border: 1px solid #ccc;
      padding: 0.5em 1em;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      z-index: 100;
    }

    body.dark {
      background: #1a1a1a;
      color: #e0e0e0;
    }

    body.dark header,
    body.dark nav {
      background: #333;
      color: white;
    }

    body.dark nav button {
      color: #e0e0e0;
    }

    body.dark nav button.active {
      background: #444;
      border-bottom-color: #dcedc8;
    }

    body.dark .card,
    body.dark table,
    body.dark .vocab-question {
      background: #2a2a2a;
      color: #f0f0f0;
    }

    body.dark input,
    body.dark select {
      background: #222;
      color: #f0f0f0;
      border-color: #555;
    }

    body.dark .vocab-question b {
      color: #dcedc8;
    }
.result-correct {
  color: #1b7f3a;
  font-weight: bold;
}

.result-wrong {
  color: #c0392b;
  font-weight: bold;
}
    @media (max-width: 600px) {
      html, body { font-size: 17px; }
      header { font-size: 1.55em; padding: 0.9em; }
      nav button { font-size: 1.0em; padding: 0.8em 0.35em; }
      section { padding: 1em; }
      .section-title { font-size: 1.2em; }
      th, td { padding: 0.75em 0.45em; font-size: 0.95em; }
      .button-row { flex-direction: column; }
      .mode-toggle { font-size: 0.85em; padding: 0.45em 0.7em; }
    }
  </style>
</head>

<body>
  <button class="mode-toggle" onclick="toggleMode()">🌗 모드 전환</button>

  <header>All바른 English</header>

  <nav>
    <button onclick="showTab('notice')" class="active">공지사항</button>
    <button onclick="showTab('exam')">시험정보</button>
    <button onclick="showTab('retest')">재시험</button>
    <button onclick="showTab('vocab')">단어장</button>
<button onclick="showTab('favorites')">⭐중요단어</button>
  </nav>

  <section id="notice" class="active">
    <div class="section-title">📌 공지사항</div>
    <div id="notice-content"></div>
  </section>

  <section id="exam">
    <div class="section-title">📝 시험정보</div>
    <input type="date" id="exam-date">
    <select id="class-select"></select>
    <div id="exam-table"></div>
  </section>

  <section id="retest">
    <div class="section-title">🔁 재시험 명단</div>
    <div id="retest-table"></div>
  </section>

  <section id="vocab">
    <div class="section-title">📘 단어장</div>

    <select id="vocab-book-select"></select>
    <select id="vocab-day-select"></select>

    <div id="vocab-view"></div>
  </section>
<section id="favorites">
  <div class="section-title">⭐ 중요 단어장</div>

  <div id="favorites-view"></div>
</section>
  <div id="loader">
    <svg width="50" height="50" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid">
      <circle cx="50" cy="50" r="35" stroke-width="10" stroke="#3f6158"
        stroke-dasharray="164.93361431346415 56.97787143782138" fill="none"
        stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite"
          dur="1s" values="0 50 50;360 50 50" keyTimes="0;1"/>
      </circle>
    </svg>
    <div class="loader-text">로딩중...</div>
  </div>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzyk-n_G93BJG1vlck6DNakEdZolCSoB9I3ylmyN2e6qX9NNHdQYgx6phA4OU9JAwfT/exec";

    let vocabData = [];
let currentVocabWords = [];
let wrongWords = [];
let vocabHiddenMode = false;

let favoriteWords = JSON.parse(
  localStorage.getItem("favoriteWords") || "[]"
);

    function showTab(tabId) {
      document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.querySelector("nav button[onclick*='" + tabId + "']").classList.add("active");
      document.getElementById(tabId).classList.add("active");
if (tabId === "favorites") {
  showFavorites();
}
    }

    function toggleMode() {
      document.body.classList.toggle("dark");
    }

    function cleanDate(isoDate) {
      if (!isoDate) return "";
      const d = new Date(isoDate);
      if (isNaN(d.getTime())) return isoDate;
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchSheet(sheetName) {
      const res = await fetch(SHEET_URL + "?sheetName=" + encodeURIComponent(sheetName));
      return await res.json();
    }

    async function loadNotice() {
      const data = await fetchSheet("Notice");
      const target = document.getElementById("notice-content");
      target.innerHTML = "";

      for (let i = 1; i < data.length; i++) {
        const [date, title, content] = data[i];
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `📅 ${escapeHtml(cleanDate(date))}
<b>${escapeHtml(title)}</b>
${escapeHtml(content)}`;
        target.appendChild(card);
      }
    }

    async function loadClassDropdown() {
      const data = await fetchSheet("TestInfo");
      const select = document.getElementById("class-select");
      const uniqueClasses = [...new Set(data.slice(1).map(row => row[0]).filter(Boolean))];
      select.innerHTML = uniqueClasses.map(c => `<option>${escapeHtml(c)}</option>`).join("");
    }

    async function loadExam() {
      const data = await fetchSheet("TestInfo");
      const date = document.getElementById("exam-date").value;
      const className = document.getElementById("class-select").value;
      const table = document.getElementById("exam-table");

      const filtered = data.filter((row, i) =>
        i === 0 || (row[0] === className && cleanDate(row[1]) === date)
      );

      let html = "<table><tr>" + data[0].slice(0, 4).map(h => `<th>${escapeHtml(h)}</th>`).join("") + "</tr>";

      for (let i = 1; i < filtered.length; i++) {
        html += "<tr>" + filtered[i].slice(0, 4).map((cell, j) =>
          `<td>${escapeHtml(j === 1 ? cleanDate(cell) : cell)}</td>`
        ).join("") + "</tr>";
      }

      html += "</table>";
      table.innerHTML = html;
    }

    async function loadRetest() {
      const data = await fetchSheet("Retest");
      const target = document.getElementById("retest-table");

      let html = "<table><tr>"
        + data[0].map(h => `<th>${escapeHtml(h)}</th>`).filter(h => !h.includes("재시험")).join("")
        + "</tr>";

      for (let i = 1; i < data.length; i++) {
        html += "<tr>" + data[i].map((cell, j) => {
          if (j === 2) return `<td>${escapeHtml(cleanDate(cell))}</td>`;
          if (data[0][j] === "재시험") return null;
          return `<td>${escapeHtml(cell)}</td>`;
        }).filter(c => c).join("") + "</tr>";
      }

      html += "</table>";
      target.innerHTML = html;
    }

    async function loadVocabBooks() {
  const target = document.getElementById("vocab-view");

  try {
    vocabData = await fetchSheet("Vocab");

    if (!Array.isArray(vocabData) || vocabData.length < 2) {
      target.innerHTML = "<div class='card'>Vocab 시트에 단어 데이터가 없습니다.</div>";
      return;
    }

    const bookSelect = document.getElementById("vocab-book-select");
    const daySelect = document.getElementById("vocab-day-select");

    const books = [...new Set(
      vocabData
        .slice(1)
        .map(row => row[0])
        .filter(book => book && String(book).trim() !== "")
    )];

    if (books.length === 0) {
      target.innerHTML = "<div class='card'>단어장 이름이 없습니다. Vocab 시트 A열을 확인하세요.</div>";
      return;
    }

    bookSelect.innerHTML =
      `<option value="">단어장 선택</option>` +
      books.map(book => `<option value="${escapeHtml(book)}">${escapeHtml(book)}</option>`).join("");

    daySelect.innerHTML = `<option value="">Day 선택</option>`;

    target.innerHTML = "<div class='card'>단어장과 Day를 선택하세요.</div>";

    bookSelect.addEventListener("change", loadVocabDays);
    daySelect.addEventListener("change", showVocabList);

  } catch (err) {
    target.innerHTML = "<div class='card'>Vocab 시트를 불러오지 못했습니다. TestManager에 Vocab 시트가 있는지 확인하세요.</div>";
  }
}

    async function loadVocabDays() {
  const selectedBook = document.getElementById("vocab-book-select").value;
  const daySelect = document.getElementById("vocab-day-select");
  const target = document.getElementById("vocab-view");

  if (!selectedBook) {
    daySelect.innerHTML = `<option value="">Day 선택</option>`;
    target.innerHTML = "<div class='card'>단어장을 먼저 선택하세요.</div>";
    return;
  }

  const days = [...new Set(
    vocabData
      .slice(1)
      .filter(row => String(row[0]) === String(selectedBook))
      .map(row => row[1])
      .filter(day => day !== "" && day !== null && day !== undefined)
  )];

  daySelect.innerHTML =
    `<option value="">Day 선택</option>` +
    days.map(day => `<option value="${escapeHtml(day)}">${escapeHtml(day)}</option>`).join("");

  target.innerHTML = "<div class='card'>Day를 선택하세요.</div>";
}

    function getSelectedVocabWords() {
  const selectedBook = document.getElementById("vocab-book-select").value;
  const selectedDay = document.getElementById("vocab-day-select").value;

  if (!selectedBook || !selectedDay) {
    return [];
  }

  return vocabData.slice(1).filter(row =>
    String(row[0]) === String(selectedBook) &&
    String(row[1]) === String(selectedDay) &&
    row[2] &&
    row[3]
  );
}

    function showVocabList() {
  const target = document.getElementById("vocab-view");
const selectedBook = document.getElementById("vocab-book-select").value;
const selectedDay = document.getElementById("vocab-day-select").value;
const words = getSelectedVocabWords();

if (!selectedBook) {
  target.innerHTML = "<div class='card'>단어장을 먼저 선택하세요.</div>";
  return;
}

if (!selectedDay) {
  target.innerHTML = "<div class='card'>Day를 선택하세요.</div>";
  return;
}

if (words.length === 0) {
  target.innerHTML = "<div class='card'>표시할 단어가 없습니다.</div>";
  return;
}

  let html = `
    <div class="button-row">
      <button class="vocab-btn secondary" onclick="toggleWordHide()">
        ${vocabHiddenMode ? "영어 보기" : "영어 가리기"}
      </button>

      <button class="vocab-btn" onclick="startVocabTest()">
        단어시험 시작
      </button>

    </div>
  `;

  html += "<table>";
  html += "<tr><th>영어</th><th>뜻</th><th>중요</th></tr>";

  words.forEach(row => {
    const english = vocabHiddenMode
      ? "?".repeat(String(row[2]).length)
      : row[2];

    const key = row[0] + "|" + row[1] + "|" + row[2];
    const isFavorite = favoriteWords.includes(key);

    html += `
      <tr>
        <td>${escapeHtml(english)}</td>
        <td>${escapeHtml(row[3])}</td>
        <td>
          <button
            onclick="toggleFavorite('${encodeURIComponent(key)}')"
            style="
              border:none;
              background:none;
              font-size:1.3em;
              cursor:pointer;
            ">
            ${isFavorite ? "⭐" : "☆"}
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";
  target.innerHTML = html;
}
function toggleWordHide() {
  vocabHiddenMode = !vocabHiddenMode;
  showVocabList();
}

function toggleFavorite(encodedKey) {
  const key = decodeURIComponent(encodedKey);

  if (favoriteWords.includes(key)) {
    favoriteWords = favoriteWords.filter(x => x !== key);
  } else {
    favoriteWords.push(key);
  }

  localStorage.setItem(
    "favoriteWords",
    JSON.stringify(favoriteWords)
  );

  showVocabList();
}

function showFavorites() {

  const target =
    document.getElementById("favorites-view");

  let favorites = [];

  vocabData.slice(1).forEach(row => {

    const key =
      row[0] + "|" +
      row[1] + "|" +
      row[2];

    if (favoriteWords.includes(key)) {
      favorites.push(row);
    }

  });

  if (favorites.length === 0) {

    target.innerHTML =
      "<div class='card'>저장된 중요 단어가 없습니다.</div>";

    return;
  }

  let html = `

<div class="card">
  <b>⭐ 나의 중요 단어장</b><br>
  저장된 중요 단어 ${favorites.length}개
</div>

<div class="button-row">

  <button
    class="vocab-btn"
    onclick="startFavoriteTest()">
    중요단어 시험
  </button>

</div>
`;

  html += `
    <table>
      <tr>
        <th>단어장</th>
        <th>Day</th>
        <th>영어</th>
        <th>뜻</th>
        <th>해제</th>
      </tr>
  `;

  favorites.forEach(row => {

  const key =
    row[0] + "|" +
    row[1] + "|" +
    row[2];

  html += `
    <tr>
      <td>${escapeHtml(row[0])}</td>
      <td>${escapeHtml(row[1])}</td>
      <td>${escapeHtml(row[2])}</td>
      <td>${escapeHtml(row[3])}</td>

      <td>
        <button
          onclick="removeFavorite('${encodeURIComponent(key)}')"
          style="
            border:none;
            background:none;
            font-size:1.4em;
            cursor:pointer;
          ">
          ⭐
        </button>
      </td>

    </tr>
  `;

});
  html += "</table>";

  target.innerHTML = html;
}
    function shuffleArray(array) {
      return array
        .map(value => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(item => item.value);
    }

function startFavoriteTest() {

  const favorites =
    vocabData.slice(1).filter(row => {

      const key =
        row[0] + "|" +
        row[1] + "|" +
        row[2];

      return favoriteWords.includes(key);

    });

  if (favorites.length === 0) {

    alert("중요 단어가 없습니다.");

    return;
  }

  currentVocabWords =
    shuffleArray(favorites)
      .slice(
        0,
        Math.min(25, favorites.length)
      );

  let html = `
    <div class="card">
      <b>⭐ 중요단어 시험</b><br>
      ${currentVocabWords.length}문제
    </div>
  `;

  currentVocabWords.forEach((row, index) => {

    html += `
      <div class="vocab-question">

        <b>
          Q${index + 1}.
          ${escapeHtml(row[3])}
        </b>

        <input
          type="text"
          id="answer-${index}"
          placeholder="영어 단어 입력">

      </div>
    `;

  });

  html += `
    <button
      class="vocab-btn"
      onclick="gradeVocabTest()">
      채점하기
    </button>

    <div id="vocab-result"></div>
  `;

  document.getElementById("favorites-view").innerHTML =
    html;
}
function removeFavorite(encodedKey) {

  const key =
    decodeURIComponent(encodedKey);

  favoriteWords =
    favoriteWords.filter(
      x => x !== key
    );

  localStorage.setItem(
    "favoriteWords",
    JSON.stringify(favoriteWords)
  );

  showFavorites();
}
    function normalizeAnswer(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[.?!,;:'"()\[\]{}]/g, "")
        .replace(/\s+/g, "");
    }

    function startVocabTest() {
      const target = document.getElementById("vocab-view");
      const words = getSelectedVocabWords();

      if (words.length === 0) {
        target.innerHTML = "<div class='card'>시험을 만들 단어가 없습니다.</div>";
        return;
      }

      currentVocabWords = shuffleArray(words).slice(
  0,
  Math.min(25, words.length)
);

      let html = `
        <div class="card">
          <b>직접 입력 단어시험</b><br>
          뜻을 보고 알맞은 영어 단어를 입력하세요.<br>
          총 ${currentVocabWords.length}문제입니다.
        </div>
      `;

      currentVocabWords.forEach((row, index) => {
        const meaning = row[3];

        html += `
          <div class="vocab-question">
            <b>Q${index + 1}. ${escapeHtml(meaning)}</b>
            <input type="text" id="answer-${index}" placeholder="영어 단어 입력" autocomplete="off">
          </div>
        `;
      });

      html += `
        <button class="vocab-btn" onclick="gradeVocabTest()">채점하기</button>
        <div id="vocab-result"></div>
      `;

      target.innerHTML = html;
    }

    function gradeVocabTest() {
  let correctCount = 0;
  let resultRows = "";
  wrongWords = [];

  currentVocabWords.forEach((row, index) => {
    const correctAnswer = row[2];
    const meaning = row[3];
    const input = document.getElementById(`answer-${index}`);
    const userAnswer = input ? input.value : "";

    const isCorrect =
      normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);

    if (isCorrect) {
      correctCount++;

      if (input) {
        input.style.border = "3px solid #1b7f3a";
        input.style.backgroundColor = "#e8f8ee";
      }

    } else {
      wrongWords.push(row);

      if (input) {
        input.style.border = "3px solid #c0392b";
        input.style.backgroundColor = "#fdecea";
      }
    }

    resultRows += `
      <tr>
        <td>${escapeHtml(meaning)}</td>
        <td>${escapeHtml(userAnswer || "-")}</td>
        <td>${escapeHtml(correctAnswer)}</td>
        <td class="${isCorrect ? "result-correct" : "result-wrong"}">
          ${isCorrect ? "정답" : "오답"}
        </td>
      </tr>
    `;
  });

  let resultHtml = `
    <div class="card">
      <b>채점 결과</b><br>
      ${currentVocabWords.length}문제 중 ${correctCount}개 정답<br>
      점수: ${Math.round((correctCount / currentVocabWords.length) * 100)}점
    </div>

    <table>
      <tr>
        <th>뜻</th>
        <th>내 답</th>
        <th>정답</th>
        <th>결과</th>
      </tr>
      ${resultRows}
    </table>
  `;

  if (wrongWords.length > 0) {
    let wrongNoteHtml = `
      <div class="card">
        <b>📕 오답노트</b><br><br>
        <table>
          <tr>
            <th>뜻</th>
            <th>정답</th>
          </tr>
    `;

    wrongWords.forEach(word => {
      wrongNoteHtml += `
        <tr>
          <td>${escapeHtml(word[3])}</td>
          <td>${escapeHtml(word[2])}</td>
        </tr>
      `;
    });

    wrongNoteHtml += `
        </table>
      </div>
    `;

    resultHtml += `
      <div style="margin-top:15px;">
        <button class="vocab-btn" onclick="startWrongWordTest()">
          틀린 단어 다시 시험 (${wrongWords.length}개)
        </button>
      </div>

      ${wrongNoteHtml}
    `;
  }

  document.getElementById("vocab-result").innerHTML = resultHtml;
  document.getElementById("vocab-result").scrollIntoView({ behavior: "smooth" });
}
function startWrongWordTest() {
  if (wrongWords.length === 0) {
    alert("틀린 문제가 없습니다.");
    return;
  }

  currentVocabWords = [...wrongWords];

  let html = `
    <div class="card">
      <b>오답 재시험</b><br>
      틀린 ${wrongWords.length}개 단어만 다시 시험합니다.
    </div>
  `;

  currentVocabWords.forEach((row, index) => {
    html += `
      <div class="vocab-question">
        <b>Q${index + 1}. ${escapeHtml(row[3])}</b>
        <input type="text"
               id="answer-${index}"
               placeholder="영어 단어 입력"
               autocomplete="off">
      </div>
    `;
  });

  html += `
    <button class="vocab-btn" onclick="gradeVocabTest()">
      다시 채점하기
    </button>

    <div id="vocab-result"></div>
  `;

  document.getElementById("vocab-view").innerHTML = html;
}
    window.onload = async () => {
      try {
        await Promise.all([
          loadNotice(),
          loadClassDropdown(),
          loadRetest(),
          loadVocabBooks()
        ]);

        document.getElementById("exam-date").addEventListener("change", loadExam);
        document.getElementById("class-select").addEventListener("change", loadExam);
      } catch (err) {
        console.error(err);
      } finally {
        setTimeout(() => {
          document.getElementById("loader").classList.add("hidden");
        }, 500);
      }
    };
  </script>
</body>
